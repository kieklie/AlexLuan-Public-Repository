name: GLaDOS Auto Checkin

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 01:00（台湾时间 09:00）
  workflow_dispatch:      # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkin
        run: |
          curl -X POST "https://glados.cloud/api/user/checkin" \
            -H "cookie: ${{ secrets.GLADOS_COOKIE }}" \
            -H "content-type: application/json" \
            -H "referer: https://glados.cloud/console/checkin" \
            -d '{"token": "glados.one"}'
